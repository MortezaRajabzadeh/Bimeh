<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پینوتو | بیمه بدنه سفر محور خودرو</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container compact">

        <main class="content">
            <div class="logo-container">
                <div class="logo">
                    <div class="map-pin">
                        <div class="pin-outer"></div>
                        <div class="pin-inner"></div>
                    </div>
                </div>
                <h1 class="brand-name">پینوتو</h1>
                <h2 class="tagline">بیمه بدنه سفر محور خودرو</h2>
            </div>

            <div class="form-container">
                <label for="phone" class="form-label">شماره موبایل خود را وارد نمایید</label>
     
                    <input type="tel" id="phone" class="phone-input" placeholder="09121234567" maxlength="11" pattern="[0-9]{11}" inputmode="numeric" dir="ltr">
    
                </div>
                <button class="submit-button">دریافت کد تایید</button>
            </div>
        </main>
    </div>
</body>
</html>
